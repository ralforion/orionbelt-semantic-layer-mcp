name: Publish to PyPI

# Build and publish the sdist + wheel to PyPI on every version tag (v1.2.3),
# using PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
#
# The v* tag is pushed by the GitHub release step in scripts/release.sh, so a
# release fans out to three CI jobs off the same tag: this one (PyPI),
# docker-publish.yml (image), and the Hub description sync.
#
# One-time setup on PyPI (https://pypi.org/manage/project/
#   orionbelt-semantic-layer-mcp/settings/publishing/):
#   add a trusted publisher →
#     owner:        ralforion
#     repository:   orionbelt-semantic-layer-mcp
#     workflow:     pypi-publish.yml
#     environment:  pypi

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/project/orionbelt-semantic-layer-mcp/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
