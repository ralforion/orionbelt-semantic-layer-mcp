name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.12 is the floor (pyproject requires-python) and 3.14 is what the
        # Docker image ships — both ends must stay covered.
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}  # distinct cache per matrix leg

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run tests
        run: uv run pytest --tb=short -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Ruff check
        run: uv run ruff check server.py tests/

      - name: Ruff format check
        run: uv run ruff format --check server.py tests/

  # The release image is built only on v* tags (docker-publish.yml), so without
  # this job a base-image or dependency bump that breaks the container would not
  # surface until a release tag was already pushed. Never pushes — this is a
  # pre-merge gate, not a publish.
  #
  # One leg per platform, mirroring the release image's platform list. Each leg
  # builds a single platform on its own native runner: `load: true` cannot
  # export a multi-platform image, and native runners let each arch actually run
  # its own container instead of being emulated under QEMU.
  docker:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: obsl-mcp:ci
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Smoke test
        run: |
          set -euo pipefail
          # HTTP transport defers API detection to the first request (LazyInit-
          # Middleware), so the listener must come up without a reachable API.
          docker run -d --name obsl-ci -e API_BASE_URL=http://127.0.0.1:9999 obsl-mcp:ci

          for _ in $(seq 1 30); do
            if docker exec obsl-ci python -c "import socket; socket.create_connection(('localhost', 9000), timeout=2).close()" 2>/dev/null; then
              echo "listener up"
              exec_ok=1
              break
            fi
            sleep 1
          done

          if [ "${exec_ok:-}" != "1" ]; then
            echo "::error::server did not start listening on 9000"
            docker logs obsl-ci || true
            exit 1
          fi

          # The image must not run as root.
          test "$(docker exec obsl-ci id -un)" = "app"

          # Guard against a leg silently exercising the wrong architecture.
          case "${{ matrix.platform }}" in
            linux/amd64) want=x86_64 ;;
            linux/arm64) want=aarch64 ;;
          esac
          got=$(docker exec obsl-ci python -c "import platform; print(platform.machine())")
          echo "arch: $got"
          test "$got" = "$want"

      - name: Container logs
        if: always()
        run: docker logs obsl-ci || true
